<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- title e description são reescritos por rota em src/App.jsx -->
    <title>Calculadoras de Renda Fixa</title>
    <meta
      name="description"
      content="Duas calculadoras de renda fixa: compare dois títulos lado a lado pelo rendimento líquido depois do IR, e descubra qual prefixado empata com o dividend yield de um FII."
    />
    <meta name="theme-color" content="#14120C" />
    <meta name="color-scheme" content="dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Archivo+Expanded:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Calculadoras de Renda Fixa" />
    <meta
      property="og:description"
      content="Quanto sobra, de fato, no seu bolso ao ano — depois do IR. Prefixado, CDI, CDI+, IPCA+ e a taxa que empata com um FII."
    />
    <meta name="twitter:card" content="summary" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%2314120C'/><rect x='20' y='22' width='6' height='20' rx='1' fill='%23B79AE6'/><rect x='38' y='16' width='6' height='26' rx='1' fill='%235CC98D'/></svg>"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #14120c;
        color: #ede7d6;
        min-height: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }

      /* estado de carregamento — evita o flash branco antes do React montar */
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #14120c;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #7c755f;
        font-size: 12px;
        letter-spacing: 0.06em;
        transition: opacity 0.25s;
        z-index: 99;
      }
      #boot.gone { opacity: 0; pointer-events: none; }
      #boot .bar {
        width: 120px;
        height: 3px;
        border-radius: 2px;
        background: #2c2819;
        overflow: hidden;
        margin: 14px auto 0;
      }
      #boot .bar i {
        display: block;
        height: 100%;
        width: 40%;
        background: #e7b24e;
        border-radius: 2px;
        animation: sl 1.1s ease-in-out infinite;
      }
      @keyframes sl {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(320%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .bar i { animation: none; width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div style="text-align: center">
        carregando as calculadoras
        <div class="bar"><i></i></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
