<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- title e description são reescritos por rota em src/App.jsx -->
    <title>Calculadoras de Renda Fixa</title>
    <meta
      name="description"
      content="Duas calculadoras de renda fixa: compare dois títulos lado a lado pelo rendimento líquido depois do IR, e descubra qual prefixado empata com o dividend yield de um FII."
    />
    <meta name="theme-color" content="#0a101b" />
    <meta name="color-scheme" content="dark" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Calculadoras de Renda Fixa" />
    <meta
      property="og:description"
      content="Quanto sobra, de fato, no seu bolso ao ano — depois do IR. Prefixado, CDI, CDI+, IPCA+ e a taxa que empata com um FII."
    />
    <meta name="twitter:card" content="summary" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a101b'/><path d='M12 44 L26 30 L36 38 L52 18' fill='none' stroke='%23f2b84b' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/></svg>"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a101b;
        color: #e9eef7;
        min-height: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }

      /* estado de carregamento — evita o flash branco antes do React montar */
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0a101b;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #5b6b83;
        font-size: 12px;
        letter-spacing: 0.06em;
        transition: opacity 0.25s;
        z-index: 99;
      }
      #boot.gone { opacity: 0; pointer-events: none; }
      #boot .bar {
        width: 120px;
        height: 3px;
        border-radius: 2px;
        background: #1f2c44;
        overflow: hidden;
        margin: 14px auto 0;
      }
      #boot .bar i {
        display: block;
        height: 100%;
        width: 40%;
        background: #f2b84b;
        border-radius: 2px;
        animation: sl 1.1s ease-in-out infinite;
      }
      @keyframes sl {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(320%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .bar i { animation: none; width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div style="text-align: center">
        carregando as calculadoras
        <div class="bar"><i></i></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
